<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Login | Solo Leveling</title>
    <link rel="stylesheet" href="/Homepage/style.css">
</head>
<body id="vanta-canvas">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <script src="script.js"></script>
    
    <script>
        VANTA.NET({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x00d4ff,           /* Neon Blue dots/lines */
            backgroundColor: 0x0b1b2a, /* Dark System background */
            points: 10.00,
            maxDistance: 20.00,
            spacing: 15.00
        })
    </script>
    
    <div class="system-container">
        <div class="quest-header">
            <h2>[ QUEST: REGISTRATION ]</h2>
            <p>Will you accept the invitation to become a Player?</p>
        </div>

        <form class="signup-form">
            <div class="input-group">
                <label>PLAYER NAME</label>
                <input type="text" placeholder="Enter your name..." required>
            </div>
            <button type="submit" class="accept-btn">ACCEPT</button>
        </form>
    </div>
</body>
</html>
