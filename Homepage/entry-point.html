<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian Prime | System Boot</title>
    <style>
        /* General Styles */
        body {
            background-color: #0a0a0a;
            color: #00D4FF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. LOADER SECTION */
        #loader {
            text-align: center;
            transition: opacity 0.8s ease-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 207, 255, 0.1);
            border-top: 4px solid #00D4FF;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            box-shadow: 0 0 15px rgba(0, 225, 255, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 2. DASHBOARD SECTION (Hidden by default) */
        #dashboard {
            display: none;
            text-align: center;
            width: 90%;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s ease-out;
        }

        /* When the class 'active' is added via JS */
        #dashboard.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 207, 255, 0.5);
        }

        .nav-list {
            list-style: none;
            padding: 0;
        }

        .nav-item {
            margin: 15px 0;
        }

        .nav-link {
            text-decoration: none;
            color: #00D4FF;
            font-size: 1.2rem;
            padding: 12px 30px;
            border: 1px solid #00D4FF;
            display: block;
            border-radius: 5px;
            transition: all 0.3s;
            background: rgba(0, 255, 204, 0.05);
        }

        .nav-link:hover {
            background: #00D4FF;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 202, 255, 0.6);
            transform: translateX(10px);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Initializing Meridian Prime...</div>
    </div>

    <div id="dashboard">
        <h1>ACADEMIC ACCESS</h1>
        <ul class="nav-list">
            <li class="nav-item">
                <a href="/Testing 1/g.html" class="nav-link">GEOGRAPHY</a>
            </li>
            <li class="nav-item">
                <a href="/Background/background.html" class="nav-link">Background</a>
            </li>
            <li class="nav-item">
                <a href="sepedi.html" class="nav-link">SEPEDI (HL)</a>
            </li>
            <li class="nav-item">
                <a href="life_orientation.html" class="nav-link">LIFE ORIENTATION</a>
            </li>
            <li class="nav-item">
                <a href="english.html" class="nav-link">ENGLISH (FAL)</a>
            </li>
        </ul>
    </div>

    <script>
        // Set the timer for the transition
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const dashboard = document.getElementById('dashboard');

                // 1. Fade out the loader
                loader.style.opacity = '0';

                // 2. Wait for fade out to finish, then swap displays
                setTimeout(() => {
                    loader.style.display = 'none';
                    dashboard.classList.add('active');
                }, 800); 

            }, 3000); // 3-second initialization delay
        });
    </script>
</body>
</html>
