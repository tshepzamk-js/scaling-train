<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject | Topic Test</title>
    <style>
        :root {
            --accent-blue: #00d4ff;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .header {
            border-left: 4px solid var(--accent-blue);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        h1 { color: var(--accent-blue); margin: 0; font-size: 1.8rem; }
        p { opacity: 0.7; margin-top: 5px; }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: 0.3s;
        }

        .question-card:hover {
            border-color: var(--accent-blue);
        }

        .q-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            padding: 12px;
            color: var(--accent-blue);
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent-blue); }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button {
            padding: 12px 25px;
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background: var(--accent-blue);
            color: #000;
        }
    </style>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>

</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="test-title">Calculus: First Principles</h1>
        <p id="test-meta">Subject: Mathematics | Grade 12</p>
    </div>

    <div id="questions-container">
        </div>

<div id="system-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; display:none; justify-content:center; align-items:center; opacity:0; transition: 0.5s;">
    <div id="message-box" style="background:var(--card-bg); border: 2px solid var(--accent-blue); padding: 40px; border-radius: 15px; text-align:center; box-shadow: 0 0 30px rgba(0,212,255,0.2); max-width: 80%;">
        <h2 id="msg-title" style="color:var(--accent-blue); text-transform:uppercase; letter-spacing:3px; margin-top:0;"></h2>
        <p id="msg-body" style="font-size:1.1rem; line-height:1.6; color:#ccc;"></p>
        <button onclick="closeSystemMsg()" style="margin-top:20px; padding:10px 30px; background:transparent; color:var(--accent-blue); border:1px solid var(--accent-blue); cursor:pointer; font-weight:bold;">SESSION COMPLETE</button>
    </div>
</div>

<div id="result-score" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: var(--accent-blue); display: none;">
    SCORE: <span id="score-value">0</span> / <span id="total-value">0</span>
</div>

    <div class="controls">
        <button onclick="location.href='../../Subjects/Mathematics/mathematics-ui.html'">BACK TO HUB</button>
        <button onclick="submitTest()">SUBMIT ANSWERS</button>
    </div>
</div>

<script>
    // --- THIS IS THE ONLY PART YOU CHANGE FOR NEXT WEEK ---
const testData = {
    title: "Topic: Level _ Complexity",
    meta: "Good Luck 🫡",
    questions: [
        {
            id: 1,
            q: "Find the derivative $f'(x)$ of $f(x) = x^3 + x^2 + x + 1$.",
            ans: "3x^2 + 2x + 1"
        },
        {
            id: 2,
            q: "Find the derivative $g'(x)$ of $g(x) = 4x^3 - 5x + 2$.",
            ans: "12x^2 - 5"
        },
        {
            id: 3,
            q: "Calculate the gradient of $f(x) = x^3$ at the point where $x = 2$.",
            ans: "12"
        },
        {
            id: 4,
            q: "At what value of $x$ is the gradient of $y = x^3$ equal to 27?",
            ans: "3 or -3"
        },
        {
            id: 5,
            q: "Find the derivative of $h(x) = \\frac{1}{3}x^3 - 4x^2$.",
            ans: "x^2 - 8x"
        },
        
        // --- TOPIC 2: STATIONARY POINTS (TURNING POINTS) ---
        {
            id: 6,
            q: "Solve for $x$ if $f'(x) = 0$ for the function $f(x) = x^3 - 3x$.",
            ans: "x = 1 or x = -1"
        },
        {
            id: 7,
            q: "Find the y-coordinate of the local maximum of $f(x) = x^3 - 3x$.",
            ans: "2"
        },
        {
            id: 8,
            q: "How many stationary points does a standard cubic function $y = ax^3 + bx^2 + cx + d$ typically have?",
            ans: "At most 2"
        },
        {
            id: 9,
            q: "Determine the stationary points of $g(x) = x^3 - 12x + 5$.",
            ans: "x = 2 and x = -2"
        },
        {
            id: 10,
            q: "If a cubic graph has turning points at $x=0$ and $x=4$, what is the x-coordinate of its inflection point?",
            ans: "2"
        },
        
        // --- TOPIC 3: SECOND DERIVATIVES & CONCAVITY ---
        {
            id: 11,
            q: "Find the second derivative $f''(x)$ of $f(x) = 2x^3 - 6x^2$.",
            ans: "12x - 12"
        },
        {
            id: 12,
            q: "Solve $f''(x) = 0$ for $f(x) = x^3 - 9x^2 + 24x$.",
            ans: "x = 3"
        },
        {
            id: 13,
            q: "On what interval is $y = x^3$ concave up?",
            ans: "x > 0"
        },
        {
            id: 14,
            q: "On what interval is $y = -x^3 + 6x^2$ concave down?",
            ans: "x > 2"
        },
        {
            id: 15,
            q: "What is the value of the second derivative at a point of inflection?",
            ans: "0"
        },
        
        // --- TOPIC 4: INTERCEPTS & ROOTS ---
        {
            id: 16,
            q: "Find the y-intercept of $f(x) = 2x^3 - 5x^2 + 3x - 7$.",
            ans: "-7"
        },
        {
            id: 17,
            q: "Find the x-intercepts of $f(x) = x^3 - 4x$.",
            ans: "0, 2, -2"
        },
        {
            id: 18,
            q: "Find the x-intercepts of $g(x) = x^3 - x^2$.",
            ans: "0 and 1"
        },
        {
            id: 19,
            q: "If $(x-1)$ is a factor of $x^3 + kx^2 + x - 3$, find $k$.",
            ans: "1"
        },
        {
            id: 20,
            q: "Find the coordinates of the point where $y = x^3$ crosses the y-axis.",
            ans: "(0, 0)"
        },
        
        // --- TOPIC 5: INTEGRATED ANALYSIS (THE CHALLENGE) ---
        {
            id: 21,
            q: "Find the inflection point of $f(x) = x^3 - 6x^2 + 12x$.",
            ans: "(2, 8)"
        },
        {
            id: 22,
            q: "Find the equation of the tangent to $y = x^3$ at $x = 1$.",
            ans: "y = 3x - 2"
        },
        {
            id: 23,
            q: "If $f'(x) = 3x^2 - 6x$, for what values of $x$ is the function $f$ increasing?",
            ans: "x < 0 or x > 2"
        },
        {
            id: 24,
            q: "Determine the nature of the stationary point at $x=0$ for $y = x^3$.",
            ans: "Point of Inflection (Stationary)"
        },
        {
            id: 25,
            q: "A cubic graph has turning points at $(-1, 4)$ and $(3, -28)$. Find the y-coordinate of its inflection point.",
            ans: "-12"
        }
    ]
};

    // --- ENGINE LOGIC (Leave this alone) ---
    function loadTest() {
        document.getElementById('test-title').innerText = testData.title;
        document.getElementById('test-meta').innerText = testData.meta;

        const container = document.getElementById('questions-container');
        
        testData.questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="q-text"><strong>Q${index + 1}:</strong> ${item.q}</div>
                <input type="text" placeholder="Type your answer here..." id="ans-${item.id}">
            `;
            container.appendChild(card);
        });
    // ADD THIS LINE:
    MathJax.typesetPromise();
    }

function showSystemMsg(title, body) {
    // 1. Retrieve the name from localStorage
    // Change 'playerName' to whatever key you used in your sign-in page (e.g., 'name' or 'user')
    const savedName = localStorage.getItem('playerName') || "Candidate";
    
    const overlay = document.getElementById('system-overlay');
    document.getElementById('msg-title').innerText = title;
    
    // 2. Insert the name into the body text
    // We use ${savedName} to drop the name right into the sentence
    document.getElementById('msg-body').innerText = `Salutations, ${savedName}. ${body}`;
    
    overlay.style.display = 'flex';
    setTimeout(() => {
        overlay.style.opacity = '1';
    }, 10);
}

function closeSystemMsg() {
    const overlay = document.getElementById('system-overlay');
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
}

// Update your submitTest logic:
function submitTest() {
    let score = 0;
    const total = testData.questions.length;
    
    testData.questions.forEach((item) => {
        const inputField = document.getElementById(`ans-${item.id}`);
        const userValue = inputField.value.trim().toLowerCase();
        const correctValue = item.ans.toLowerCase();
        
        if (userValue === correctValue) {
            // Correct Answer
            score++;
            inputField.style.borderColor = "#2ecc71"; // Green
            inputField.style.backgroundColor = "rgba(46, 204, 113, 0.1)";
        } else {
            // Wrong Answer
            inputField.style.borderColor = "#e74c3c"; // Red
            inputField.style.backgroundColor = "rgba(231, 76, 60, 0.1)";
            // Optional: Show the correct answer in the placeholder
            inputField.placeholder = `Correct: ${item.ans}`;
        }
        
        // Disable input after submission so they can't change it
        inputField.disabled = true;
    });
    
    // Display the final score
    document.getElementById('result-score').style.display = "block";
    document.getElementById('score-value').innerText = score;
    document.getElementById('total-value').innerText = total;
    
    const percentage = (score / total) * 100;
    
    if (percentage >= 80) {
        showSystemMsg("Sync Complete", "Distinction Level achieved. The core logic is flawless. Meridian Prime is fully optimized.");
    } else if (percentage >= 50) {
        showSystemMsg("System Warning", "Analysis passed, but interference detected. Review the calculus nodes to reach peak performance.");
    } else {
        showSystemMsg("Critical Error", "Logic failure in the assessment phase. Reboot your study sequence and try again.");
    }
}

    window.onload = () => {
    loadTest();
    const name = localStorage.getItem('playerName') || "User";
    document.getElementById('test-meta').innerText += ` | Active Session: ${name}`;
};
</script>

</body>
</html>
