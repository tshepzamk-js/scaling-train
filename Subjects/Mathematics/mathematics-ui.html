<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian Prime | System Boot</title>
    <style>
        :root {
            --item-height: 50px;
            --accent-blue: #00d4ff;
        }

        /* GENERAL STYLES */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. LOADER SECTION */
        #loader {
            text-align: center;
            transition: opacity 0.8s ease-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 207, 255, 0.1);
            border-top: 4px solid var(--accent-blue);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
            color: var(--accent-blue);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 2. DASHBOARD SECTION */
        #dashboard {
            display: none;
            text-align: center;
            width: 90%;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s ease-out;
        }

        #dashboard.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* 3. WHEEL PICKER INTEGRATION */
        .picker {
            position: relative;
            height: 250px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
            perspective: 1200px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .picker-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: var(--item-height);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .scroll-wrapper {
            position: absolute;
            inset: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            z-index: 5;
        }

        .scroll-wrapper::-webkit-scrollbar { display: none; }

        .scroll-gap { height: 100px; }

        .scroll-item {
            height: var(--item-height);
            scroll-snap-align: center;
            color: transparent; /* Text is shown on the 3D wheel instead */
        }

        .wheel {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: var(--item-height);
            margin-top: calc(var(--item-height) / -2);
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .wheel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            font-size: 1.4rem;
            color: #888;
            transition: color 0.2s, font-weight 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Action Button */
        .enter-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px var(--accent-blue);
        }
        
        .back-btn {
        margin-top: 30px;
        padding: 12px 40px;
        background: transparent;
        color: var(--accent-blue);
        border: 1px solid var(--accent-blue);
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
        }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Integrating Mathematics Module...</div>
    </div>

    <div id="dashboard">
        <h1>MATHEMATICS</h1>
        
        <div class="picker">
            <div class="picker-handle"></div>
            <div id="scrollWrapper" class="scroll-wrapper">
                <div class="scroll-gap"></div>
                <div class="scroll-gap"></div>
            </div>
            <div id="wheel" class="wheel"></div>
        </div>

        <button class="enter-btn" onclick="navigateToLresource()">ACCESS LEARNING RESOURCE</button>
        <button class="back-btn" onclick="location.href='/Homepage/entry-point.html'">BACK TO HUB</button>
    </div>

    <script>
        const lresources = [
            { name: 'Math Test', url: '../../Subjects/Mathematics/math-test.html' },
        ];

        const wrapper = document.getElementById('scrollWrapper');
        const wheel = document.getElementById('wheel');
        const anglePerItem = 360 / lresources.length;
        let activeIndex = 0;

        // 1. Generate Wheel Items
        lresources.forEach((lresource, i) => {
            // Create scroll target
            const sItem = document.createElement('div');
            sItem.className = 'scroll-item';
            wrapper.insertBefore(sItem, wrapper.lastElementChild);

            // Create 3D Wheel item
            const wItem = document.createElement('div');
            wItem.className = 'wheel-item';
            wItem.innerText = lresource.name;
            wItem.style.transform = `rotateX(${-i * anglePerItem}deg) translateZ(120px)`;
            wheel.appendChild(wItem);
        });

        // 2. Wheel Rotation Logic
        wrapper.addEventListener('scroll', () => {
            const scrollValue = wrapper.scrollTop;
            const rotation = (scrollValue / 50) * anglePerItem;
            wheel.style.transform = `rotateX(${rotation}deg)`;

            // Visual Polish: Highlight active
            activeIndex = Math.round(scrollValue / 50);
            document.querySelectorAll('.wheel-item').forEach((item, i) => {
                if (i === activeIndex) {
                    item.style.color = '#00d4ff';
                    item.style.fontWeight = 'bold';
                } else {
                    item.style.color = '#444';
                    item.style.fontWeight = 'normal';
                }
            });
        });

        function navigateToLresource() {
            const selected = lresources[activeIndex];
            if(selected) window.location.href = selected.url;
        }

        // 3. Boot Sequence Timer
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const dashboard = document.getElementById('dashboard');
                
                loader.style.opacity = '0';
                
                setTimeout(() => {
                    loader.style.display = 'none';
                    dashboard.classList.add('active');
                }, 800);
            }, 1000); 
        });
    </script>
</body>
</html>
